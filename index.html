  <title>Fox's Slimes · original folders + A–Z headers </title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #000;
      font-family: 'Courier New', monospace;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      position: relative;
      min-height: 100vh;

      background-image: url('fall.gif');   /* your image file */
      background-size: cover;                    /* covers entire screen */
      background-position: center;                /* centers the image */
      background-repeat: no-repeat;                /* no tiling */
      background-attachment: fixed;   /* ← this locks the image in place */
      /* optional overlay to keep text readable */
      background-color: rgba(255, 179, 0, 0.112);          /* dark overlay if image is light */
      background-blend-mode: overlay;              /* blends color with image */

    }

    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.4);   /* dark overlay */
      z-index: -1;
    }

    h1 {
      font-size: 2.5em;
      margin-bottom: 5px;
      font-weight: bold;
      text-align: center;
      color: #fff;
      text-shadow: none;
    }

    h2 {
      font-size: 1.2em;
      margin-bottom: 30px;
      font-weight: bold;
      text-align: center;
      color: #ddd;
    }

    /* ----- alphabetical sidebar (A–Z wheel) ----- */
    .alphabet-sidebar {
      position: fixed;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 6px;
      background: rgba(0, 0, 0, 0.9);
      padding: 12px 6px;
      border: 2px solid #fff;
      border-radius: 30px;
      z-index: 100;
      max-height: 90vh;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #fff #000;
    }

    .alphabet-sidebar::-webkit-scrollbar {
      width: 6px;
    }
    .alphabet-sidebar::-webkit-scrollbar-track {
      background: #000;
    }
    .alphabet-sidebar::-webkit-scrollbar-thumb {
      background: #fff;
      border-radius: 10px;
    }

    .alphabet-sidebar a {
      color: #fff;
      text-decoration: none;
      font-size: 1.2rem;
      font-weight: bold;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #fff;
      border-radius: 50%;
      transition: 0.2s;
      background: #000;
    }

    .alphabet-sidebar a:hover {
      background: #fff;
      color: #000;
      border-color: #fff;
      transform: scale(1.1);
    }

    /* main content – leave space for sidebar */
    .main-content {
      width: 100%;
      max-width: 1300px;
      margin-left: 60px;   /* avoid overlap with fixed sidebar */
      padding: 0 10px;
    }

    /* ----- letter headers: A ----- with dashed line ----- */
    .letter-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 50px 0 25px 0;
      scroll-margin-top: 20px;
      font-size: 2.8rem;
      font-weight: bold;
      color: #fff;
      text-shadow: none;
      font-family: inherit;
    }

    .letter-header .dash-line {
      flex: 1;
      border-bottom: 3px dashed #fff;
      height: 1px;
      margin-top: 8px;
    }

    /* container for folders under each letter */
    .folders-container {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: flex-start;
      margin-bottom: 40px;
    }

    /* ----- ORIGINAL folder styles (red inner square, white hover) ----- */
    .folder {
      background-color: #000;
      border: 2px solid #fff;
      padding: 20px;
      width: 250px;               /* original width */
      min-height: 150px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: box-shadow 0.3s, transform 0.3s, border-color 0.3s;
      border-radius: 4px;
      position: relative;
    }

    .folder::before {
      content: '';
      position: absolute;
      top: 10px;
      left: 10px;
      right: 10px;
      bottom: 10px;
      /*background-color: #474747ce;   /* orange‑red square */
      background-color: rgb(61, 35, 17);
      opacity: 0.5;
      z-index: 0;
      pointer-events: none;
    }

    .folder:hover {
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.8);
      transform: translateY(-3px);
      border-color: #fff;
    }

    .folder:hover::before {
      opacity: 0.4;
    }

    .folder-title {
      font-size: 1.3em;
      text-align: center;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-grow: 1;
      position: relative;
      z-index: 1;
    }

    .folder-contents {
      margin-top: 10px;
      display: none;
      flex-direction: column;
      gap: 10px;
      width: 100%;
      font-size: 15px;
      position: relative;
      z-index: 1;
    }

    .folder-link {
      display: block;
      padding: 10px;
      border: 2px solid #fff;
      text-decoration: none;
      color: #fff;
      transition: all 0.3s;
      border-radius: 2px;
      text-align: center;
      word-break: break-word;
    }

    .folder-link:hover {
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
      background-color: #111;
    }

    .folder.active .folder-contents {
      display: flex;
      flex-grow: 0;
      margin-bottom: 10px;
    }

    /* ----- flat list of all links (alphabetical) ----- */
    .all-links-section {
      margin-top: 80px;
      border-top: 3px dashed #fff;
      padding-top: 30px;
    }

    .all-links-section h2 {
      font-size: 2rem;
      color: #fff;
      margin-bottom: 30px;
      text-shadow: none;
      font-family: 'Courier New', monospace;
      text-align: left;
      border-bottom: 2px solid #fff;
      padding-bottom: 8px;
    }

    .all-links-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 900px;
      margin: 0 auto;
    }

    .all-links-list li {
      border: 1px solid #444;
      padding: 8px 15px;
      background: #0a0a0a;
      border-radius: 4px;
    }

    .all-links-list a {
      color: #fff;
      text-decoration: none;
      font-size: 1.1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
    }

    .all-links-list a:hover {
      color: #ccc;
      text-decoration: underline;
    }

    .link-meta {
      color: #aaa;
      font-size: 0.85rem;
      font-family: 'Courier New', monospace;
      background: #1a1a1a;
      padding: 2px 8px;
      border-radius: 16px;
    }

    .note {
        background: #161204d7;
        /*border-left: 4px solid #ffc107;*/
        padding: 0.75rem 1rem;
        margin-bottom: 2rem;
        border-radius: 4px;
      }

    /* responsive */
    @media (max-width: 900px) {
      .alphabet-sidebar {
        left: 5px;
        padding: 8px 4px;
      }
      .alphabet-sidebar a {
        width: 28px;
        height: 28px;
        font-size: 1rem;
      }
      .main-content {
        margin-left: 45px;
      }
    }

    @media (max-width: 700px) {
      .folders-container {
        justify-content: center;
      }
      .folder {
        width: 100%;
        max-width: 350px;
      }
      .alphabet-sidebar {
        flex-direction: row;
        left: 50%;
        transform: translateX(-50%);
        top: auto;
        bottom: 10px;
        width: 90%;
        justify-content: center;
        flex-wrap: wrap;
        border-radius: 40px;
        padding: 10px;
      }
      .main-content {
        margin-left: 0;
        margin-bottom: 100px;
      }

    }
  </style>
</head>

      // ---------- sort musicals alphabetically by title ----------
      musicals.sort((a, b) => a.title.localeCompare(b.title));

      // ---------- group by first letter (A–Z, # for others) ----------
      const groups = {};
      musicals.forEach(m => {
        let firstChar = m.title.trim().charAt(0).toUpperCase();
        if (!/[A-Z]/.test(firstChar)) firstChar = '#';
        if (!groups[firstChar]) groups[firstChar] = [];
        groups[firstChar].push(m);
      });

      // ---------- render folders with new letter headers (A -----) ----------
      const container = document.getElementById('dynamicFolders');
      container.innerHTML = '';

      const sortedLetters = Object.keys(groups).sort((a, b) => {
        if (a === '#') return 1;
        if (b === '#') return -1;
        return a.localeCompare(b);
      });

      // store for sidebar
      const letterIds = [];

      sortedLetters.forEach(letter => {
        const headerId = `letter-${letter}`;
        letterIds.push({ letter, id: headerId });

        // create header div with letter and dashed line
        const headerDiv = document.createElement('div');
        headerDiv.className = 'letter-header';
        headerDiv.id = headerId;

        const letterSpan = document.createElement('span');
        letterSpan.textContent = letter;
        headerDiv.appendChild(letterSpan);

        const dashSpan = document.createElement('span');
        dashSpan.className = 'dash-line';
        headerDiv.appendChild(dashSpan);

        container.appendChild(headerDiv);

        // create a container for folders under this letter
        const folderGroup = document.createElement('div');
        folderGroup.className = 'folders-container';

        groups[letter].forEach(musical => {
          const folderDiv = document.createElement('div');
          folderDiv.className = 'folder';
          folderDiv.setAttribute('onclick', 'toggleFolder(this)');

          const titleDiv = document.createElement('div');
          titleDiv.className = 'folder-title';
          titleDiv.innerHTML = `<b>${musical.title}</b>`;
          folderDiv.appendChild(titleDiv);

          const contentsDiv = document.createElement('div');
          contentsDiv.className = 'folder-contents';

          musical.links.forEach(link => {
            const a = document.createElement('a');
            a.href = link.url;
            a.target = '_blank';
            a.className = 'folder-link';
            a.textContent = link.text;
            contentsDiv.appendChild(a);
          });

          folderDiv.appendChild(contentsDiv);
          folderGroup.appendChild(folderDiv);
        });

        container.appendChild(folderGroup);
      });

      // ---------- build alphabetical sidebar (only letters that exist) ----------
      const sidebar = document.getElementById('alphabetSidebar');
      sidebar.innerHTML = '';
      const allLetters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
      allLetters.forEach(letter => {
        if (groups[letter]) {
          const a = document.createElement('a');
          a.href = `#letter-${letter}`;
          a.textContent = letter;
          sidebar.appendChild(a);
        }
      });
      if (groups['#']) {
        const a = document.createElement('a');
        a.href = '#letter-#';
        a.textContent = '#';
        sidebar.appendChild(a);
      }

      // ---------- build flat alphabetical list of ALL links ----------
      const allLinks = [];
      musicals.forEach(musical => {
        musical.links.forEach(link => {
          allLinks.push({
            text: link.text,
            url: link.url,
            musical: musical.title
          });
        });
      });

      allLinks.sort((a, b) => a.text.localeCompare(b.text));

      const listEl = document.getElementById('allLinksList');
      listEl.innerHTML = '';
      allLinks.forEach(item => {
        const li = document.createElement('li');
        const a = document.createElement('a');
        a.href = item.url;
        a.target = '_blank';
        a.innerHTML = `${item.text} <span class="link-meta">${item.musical}</span>`;
        li.appendChild(a);
        listEl.appendChild(li);
      });

      // ---------- toggle function ----------
      window.toggleFolder = function(folderElement) {
        folderElement.classList.toggle('active');
      };

      // smooth scroll for sidebar
      document.querySelectorAll('.alphabet-sidebar a').forEach(anchor => {
        anchor.addEventListener('click', function(e) {
          e.preventDefault();
          const targetId = this.getAttribute('href').substring(1);
          const targetEl = document.getElementById(targetId);
          if (targetEl) {
            targetEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
          }
        });
      });
    })();
  </script>
